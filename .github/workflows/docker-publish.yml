name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  DOCKERHUB_IMAGE: localzet/deployer
  GHCR_IMAGE: ghcr.io/localzet/deployer

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: localzet
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: localzet
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=Localzet Deployer
            org.opencontainers.image.description=Self-hosted CI/CD control plane with GitHub webhooks, Docker registry publishing, Portainer redeploys, history, and rollback.
            org.opencontainers.image.source=https://github.com/localzet/deployer
            org.opencontainers.image.vendor=Ivan Zorin
            org.opencontainers.image.licenses=AGPL-3.0-only

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Docker Publish"
            echo
            echo "- Docker Hub: \`${DOCKERHUB_IMAGE}\`"
            echo "- GHCR: \`${GHCR_IMAGE}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
